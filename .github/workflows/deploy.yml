# Clinova CD — SSH into AWS (Lightsail/EC2) and rebuild Docker Compose.
#
# Manual only: Actions → Deploy → Run workflow.
# Optional input: git ref (branch, tag, or commit SHA) for deploy or rollback.
# Setup: docs/DEPLOY-AWS.md → Continuous deploy

name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or commit SHA). Default: main"
        required: false
        default: "main"
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under: Settings → Secrets and variables → Actions"
            echo "Guide: docs/DEPLOY-AWS.md (Continuous deploy)"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 45m
          script_stop: true
          envs: DEPLOY_PATH,DEPLOY_REF
          script: |
            set -euo pipefail

            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/Clinova}"
            DEPLOY_REF="${DEPLOY_REF:-main}"
            echo "==> Deploy path: ${DEPLOY_PATH}"
            echo "==> Deploy ref:  ${DEPLOY_REF}"

            if [ ! -d "${DEPLOY_PATH}" ]; then
              echo "ERROR: ${DEPLOY_PATH} not found."
              echo "Clone the repo once and create .env.docker (see docs/DEPLOY-AWS.md)."
              exit 1
            fi

            if [ ! -f "${DEPLOY_PATH}/.env.docker" ]; then
              echo "ERROR: ${DEPLOY_PATH}/.env.docker missing."
              echo "Copy from .env.docker.example and set JWT secrets + CLIENT_URL."
              exit 1
            fi

            cd "${DEPLOY_PATH}"

            echo "==> Before: $(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
            git fetch --prune origin --tags

            # Resolve ref: origin/<branch>, tag, or commit SHA
            if git rev-parse --verify --quiet "origin/${DEPLOY_REF}" >/dev/null; then
              TARGET="origin/${DEPLOY_REF}"
            elif git rev-parse --verify --quiet "${DEPLOY_REF}" >/dev/null; then
              TARGET="${DEPLOY_REF}"
            else
              echo "ERROR: Could not resolve ref '${DEPLOY_REF}' (try main, a tag, or full SHA after fetch)."
              exit 1
            fi

            git checkout --detach "${TARGET}"
            echo "==> Now at $(git rev-parse --short HEAD) (${TARGET})"

            if docker info >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif sudo docker info >/dev/null 2>&1; then
              COMPOSE="sudo docker compose"
            else
              echo "ERROR: Docker not available. Run scripts/aws-bootstrap.sh and ensure user is in the docker group."
              exit 1
            fi

            echo "==> Compose rebuild"
            $COMPOSE --env-file .env.docker up --build -d --remove-orphans

            echo "==> Container status"
            $COMPOSE --env-file .env.docker ps

            WEB_PORT=80
            if grep -qE '^WEB_PORT=' .env.docker; then
              WEB_PORT=$(grep -E '^WEB_PORT=' .env.docker | tail -1 | cut -d= -f2- | tr -d '[:space:]"')
            fi
            WEB_PORT="${WEB_PORT:-80}"

            echo "==> Local health check (port ${WEB_PORT})"
            ok=0
            for i in $(seq 1 40); do
              if curl -sf "http://127.0.0.1:${WEB_PORT}/health" >/dev/null 2>&1; then
                echo "Health OK"
                ok=1
                break
              fi
              sleep 3
            done

            if [ "$ok" -ne 1 ]; then
              echo "ERROR: /health did not become ready"
              $COMPOSE --env-file .env.docker logs --tail=80 api || true
              $COMPOSE --env-file .env.docker logs --tail=40 web || true
              exit 1
            fi

            echo "==> Deploy finished"
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_REF: ${{ inputs.ref }}

      - name: Public health check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          url="http://${DEPLOY_HOST}/health"
          echo "Probing ${url}"
          for i in $(seq 1 15); do
            if curl -sf --connect-timeout 5 --max-time 10 "${url}"; then
              echo ""
              echo "Public health OK"
              exit 0
            fi
            sleep 4
          done
          echo "::warning::Could not reach public /health (firewall or non-80 WEB_PORT). SSH deploy still completed."
          exit 0
